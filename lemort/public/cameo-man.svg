<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="background:#e8e0d0">
  <!-- Simple side-profile man with top hat in dark silhouette -->
  <g fill="#3a2e20">
    <!-- Top hat -->
    <rect x="38" y="12" width="30" height="4" rx="1"/>
    <rect x="42" y="16" width="22" height="16" rx="1"/>
    <!-- Head -->
    <ellipse cx="54" cy="40" rx="13" ry="14"/>
    <!-- Neck -->
    <rect x="48" y="52" width="10" height="8"/>
    <!-- Shoulder/body -->
    <ellipse cx="50" cy="68" rx="20" ry="14"/>
  </g>
</svg>
