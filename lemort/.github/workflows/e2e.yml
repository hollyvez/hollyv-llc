name: E2E smoke tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also triggerable manually with a custom URL (e.g. after a Netlify deploy)
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to test against (default: http://localhost:3000)"
        required: false
        default: ""

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Use the manually-supplied URL if provided; otherwise spin up locally
      BASE_URL: ${{ github.event.inputs.base_url }}
      # Minimal env vars needed to start the Next.js dev server
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lemort/package-lock.json

      - name: Install dependencies
        working-directory: lemort
        run: npm ci

      - name: Install Playwright browsers
        working-directory: lemort
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        working-directory: lemort
        run: npx prisma generate

      - name: Run E2E tests
        working-directory: lemort
        run: npm run test:e2e
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: lemort/playwright-report/
          retention-days: 7
